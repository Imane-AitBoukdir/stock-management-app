# ── H2 Embedded Database Profile ──────────────────────────
# Use this profile to run the app without MySQL:
#   mvn spring-boot:run -Dspring-boot.run.profiles=h2
#   or: set SPRING_PROFILES_ACTIVE=h2

# ── Datasource (H2 file-based, data persisted between restarts) ──
spring.datasource.url=jdbc:h2:file:./data/stockdb;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── H2 Console (optional, for debugging) ─────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
