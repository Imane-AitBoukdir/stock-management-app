spring.application.name=backend

# ── Server ────────────────────────────────────────────────
server.port=8080

# ── MySQL Datasource ──────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/stockdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:mysql}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Swagger / OpenAPI ─────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ── App Security / CORS ───────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.security.jwt.secret=${APP_JWT_SECRET:c3RvY2stbWFuYWdlbWVudC1hcHAtc2VjcmV0LWtleS1mb3Itand0LTIwMjYtMDYtMDg=}
app.security.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
