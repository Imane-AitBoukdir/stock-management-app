spring.datasource.url=jdbc:h2:mem:stockdb_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT — test-only values (safe to commit)
app.security.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RzLTEyMzQ1Njc4OTAxMg==
app.security.jwt.expiration-ms=86400000

# CORS — not needed in tests, but required by CorsConfig bean
app.cors.allowed-origins=http://localhost:5173

